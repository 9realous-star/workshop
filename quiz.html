<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전략소재구매팀 퀴즈 | '26 전략소재구매팀 워크샵</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{font-family:'Noto Sans KR',sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;color:#fff;padding:20px;padding-bottom:100px}
.wrap{max-width:640px;margin:0 auto}
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:999;display:flex;justify-content:center;padding:10px 16px 14px;background:rgba(15,12,41,.92);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.08);gap:6px;overflow-x:auto}
.ni{display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 16px;border-radius:14px;text-decoration:none;font-size:.68em;font-weight:700;color:#475569;border:1px solid transparent;transition:all .2s;min-width:64px}
.ni:hover{color:#e2e8f0;background:rgba(255,255,255,.07)}
.ni .ic{font-size:1.3em;line-height:1}
.ah{color:#c4b5fd;background:rgba(167,139,250,.15);border-color:rgba(167,139,250,.35)}
.hdr{text-align:center;padding:48px 20px 32px;position:relative}
.hdr::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:2px;height:40px;background:linear-gradient(to bottom,transparent,#34d399)}
.bdg{display:inline-block;background:rgba(52,211,153,.12);border:1px solid rgba(52,211,153,.4);color:#6ee7b7;padding:5px 18px;border-radius:20px;font-size:11px;letter-spacing:2.5px;margin-bottom:18px;font-weight:700}
.hdr h1{font-size:2.6em;font-weight:900;background:linear-gradient(135deg,#fff 0%,#34d399 55%,#06b6d4 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px;line-height:1.2}
.hsub{font-size:.92em;color:#94a3b8;line-height:1.8}
.rrtag{display:block;margin-top:12px;font-size:.7em;color:#475569;letter-spacing:.3px}
.rrtag b{font-weight:700}
.progress{text-align:center;font-size:.85em;color:#64748b;font-weight:700;margin-bottom:16px}
.progress strong{color:#34d399}
.pbartrack{height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;margin-bottom:28px}
.pbarfill{height:100%;background:linear-gradient(90deg,#34d399,#06b6d4);border-radius:3px;transition:width .3s ease}
.qcard{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:24px;padding:32px 28px;margin-bottom:22px;min-height:260px;display:flex;flex-direction:column}
.tagrow{display:flex;gap:8px;margin-bottom:18px}
.tag{font-size:.7em;font-weight:700;padding:4px 12px;border-radius:20px;letter-spacing:.5px}
.tag.cat-work{background:rgba(96,165,250,.18);color:#93c5fd;border:1px solid rgba(96,165,250,.35)}
.tag.cat-life{background:rgba(251,191,36,.18);color:#fde68a;border:1px solid rgba(251,191,36,.35)}
.tag.type{background:rgba(167,139,250,.18);color:#c4b5fd;border:1px solid rgba(167,139,250,.35)}
.qtxt{font-size:1.15em;font-weight:700;color:#f1f5f9;line-height:1.6;flex:1}
.answer{margin-top:20px;padding:16px 20px;border-radius:14px;background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.3);font-size:.95em;color:#6ee7b7;line-height:1.7;display:none}
.answer.show{display:block;animation:pop .3s ease}
@keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.answer b{color:#34d399}
.navrow{display:flex;align-items:center;gap:10px}
.navbtn{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);color:#94a3b8;font-size:1.1em;cursor:pointer;flex-shrink:0;transition:all .2s}
.navbtn:hover:not(:disabled){background:rgba(255,255,255,.1);color:#e2e8f0}
.navbtn:disabled{opacity:.3;cursor:not-allowed}
.mainbtn{flex:1;padding:14px;border-radius:16px;font-size:.95em;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;border:none;background:linear-gradient(135deg,#34d399,#06b6d4);color:#04231a;transition:opacity .2s,transform .2s}
.mainbtn:hover{opacity:.9;transform:translateY(-1px)}
.donebox{background:linear-gradient(135deg,rgba(52,211,153,.15),rgba(6,182,212,.1));border:1px solid rgba(52,211,153,.35);border-radius:24px;padding:36px 28px;text-align:center;display:none}
.donebox.show{display:block}
.donebox .emoji{font-size:3em;margin-bottom:14px}
.donebox h2{font-size:1.4em;font-weight:900;color:#fff;margin-bottom:10px}
.donebox p{font-size:.9em;color:#94a3b8;line-height:1.8;margin-bottom:20px}
.bbar{display:flex;justify-content:center;align-items:center;gap:16px;padding-bottom:16px}
.bbar img{height:20px;width:auto;background:#fff;border-radius:6px;padding:3px 8px;opacity:.75;transition:opacity .2s}
.bbar img:hover{opacity:1}
@media(max-width:600px){.hdr h1{font-size:1.9em}.ni{padding:7px 10px;min-width:56px;font-size:.62em}.qcard{padding:26px 22px;min-height:220px}}
</style>
</head>
<body>
<div class="wrap">
<div class="hdr">
  <div class="bdg">TEAM QUIZ</div>
  <h1>🎯 전략소재구매팀 퀴즈</h1>
  <p class="hsub">한 문제씩 넘기면서 풀어보세요 — 눌러야 정답이 열려요!</p>
  <div class="rrtag">R² + R² · <b style="color:#a78bfa">Refresh</b>×<b style="color:#fb923c">Respect</b> + <b style="color:#60a5fa">Review</b>×<b style="color:#34d399">Reboot</b></div>
</div>
<div class="bbar">
  <img src="hyundai.webp" alt="Hyundai">
  <img src="kia.webp" alt="Kia">
</div>

<div class="progress">문제 <strong id="qidx">1</strong> / <span id="qtotal">10</span></div>
<div class="pbartrack"><div class="pbarfill" id="pbar" style="width:10%"></div></div>

<div class="qcard" id="qcard">
  <div class="tagrow">
    <span class="tag" id="qcatTag">비업무</span>
    <span class="tag type" id="qtypeTag">OX</span>
  </div>
  <div class="qtxt" id="qtext"></div>
  <div class="answer" id="qanswer"></div>
</div>

<div class="navrow">
  <button class="navbtn" id="prevBtn" onclick="prevQ()">◀</button>
  <button class="mainbtn" id="mainBtn" onclick="onMain()">🔍 정답 보기</button>
  <button class="navbtn" id="nextBtn" onclick="nextQ()">▶</button>
</div>

<div class="donebox" id="doneBox">
  <div class="emoji">🎉</div>
  <h2>10문제 완료!</h2>
  <p>우리 팀을 조금 더 알게 되셨나요?<br>정답이 궁금하면 다시 처음부터 넘겨보세요.</p>
  <button class="mainbtn" style="max-width:200px;margin:0 auto" onclick="restart()">🔄 처음부터 다시</button>
</div>
</div>

<nav class="bnav">
  <a href="index.html"   class="ni ah"><span class="ic">🏠</span>메인</a>
  <a href="result.html"  class="ni"><span class="ic">🏆</span>Result</a>
  <a href="cheer.html"   class="ni"><span class="ic">🔥</span>Respect<br>&amp; Roast</a>
  <a href="refresh.html" class="ni"><span class="ic">✨</span>Refresh</a>
  <a href="review.html"  class="ni"><span class="ic">🔍</span>Review</a>
  <a href="reboot.html"  class="ni"><span class="ic">🚀</span>Reboot</a>
</nav>

<script>
const QS=[
  {cat:'비업무',type:'OX',q:'팀장님 자녀는 여자아이이다.',a:'정답 준비 중입니다 🙊'},
  {cat:'비업무',type:'OX',q:'병주책임님 강아지는 올해 슬개골 수술을 한 적이 있다.',a:'정답 준비 중입니다 🙊'},
  {cat:'비업무',type:'OX',q:'민재 책임님 자녀의 나이는 만 10살이다.',a:'정답 준비 중입니다 🙊'},
  {cat:'업무',type:'OX',q:'인니 JV의 현재 Capa는 약 20GWh 이다.',a:'정답 준비 중입니다 🙊'},
  {cat:'업무',type:'OX',q:'SK 북미 JV의 첫 양산 셀은 5LA 154 이다.',a:'정답 준비 중입니다 🙊'},
  {cat:'비업무',type:'주관식',q:'팀장님, 병주책임님, 민재책임님의 만 나이의 합은?',a:'정답 준비 중입니다 🙊'},
  {cat:'비업무',type:'주관식',q:'만 1년 차 매니저의 휴가 수는? (여름휴가 포함)',a:'정답 준비 중입니다 🙊'},
  {cat:'업무',type:'주관식',q:'양극재, 전구체 운영구도 업체의 합은?',a:'정답 준비 중입니다 🙊'},
  {cat:'업무',type:'주관식',q:'백종관 매니저가 담당한 업무는?',a:'북미 LG JV 재료비 인하를 통한 배터리셀 현상가 인하'},
  {cat:'업무',type:'주관식',q:'이동현 매니저가 담당한 업무는?',a:"'26 인니 JV 배터리셀 가격 1차 인하"}
];

let idx=0;
let revealed=false;

function render(){
  const q=QS[idx];
  document.getElementById('qidx').textContent=idx+1;
  document.getElementById('qtotal').textContent=QS.length;
  document.getElementById('pbar').style.width=((idx+1)/QS.length*100)+'%';
  const catTag=document.getElementById('qcatTag');
  catTag.textContent=q.cat;
  catTag.className='tag '+(q.cat==='업무'?'cat-work':'cat-life');
  document.getElementById('qtypeTag').textContent=q.type;
  document.getElementById('qtext').textContent=q.q;
  const ansEl=document.getElementById('qanswer');
  ansEl.innerHTML='<b>정답</b> '+q.a;
  ansEl.classList.remove('show');
  revealed=false;
  document.getElementById('mainBtn').textContent='🔍 정답 보기';
  document.getElementById('prevBtn').disabled=(idx===0);
  document.getElementById('nextBtn').disabled=(idx===QS.length-1);
  document.getElementById('qcard').style.display='flex';
  document.getElementById('doneBox').classList.remove('show');
}

function onMain(){
  if(!revealed){
    revealed=true;
    document.getElementById('qanswer').classList.add('show');
    document.getElementById('mainBtn').textContent=idx===QS.length-1?'🎉 결과 보기':'다음 문제 →';
  }else if(idx<QS.length-1){
    idx++;
    render();
  }else{
    document.getElementById('qcard').style.display='none';
    document.querySelector('.navrow').style.display='none';
    document.getElementById('doneBox').classList.add('show');
  }
}

function prevQ(){
  if(idx===0)return;
  idx--;
  render();
}

function nextQ(){
  if(idx===QS.length-1)return;
  idx++;
  render();
}

function restart(){
  idx=0;
  document.querySelector('.navrow').style.display='flex';
  render();
}

render();
</script>
</body>
</html>
