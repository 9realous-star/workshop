<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>액티비티 게시판 | '26 전략소재구매팀 워크샵</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{font-family:'Noto Sans KR',sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;color:#fff;padding:20px;padding-bottom:100px}
.wrap{max-width:1000px;margin:0 auto}
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:999;display:flex;justify-content:center;padding:10px 16px 14px;background:rgba(15,12,41,.92);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.08);gap:6px;overflow-x:auto}
.ni{display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 16px;border-radius:14px;text-decoration:none;font-size:.68em;font-weight:700;color:#475569;border:1px solid transparent;transition:all .2s;min-width:64px}
.ni:hover{color:#e2e8f0;background:rgba(255,255,255,.07)}
.ni .ic{font-size:1.3em;line-height:1}
.ar{color:#a78bfa;background:rgba(167,139,250,.15);border-color:rgba(167,139,250,.35)}
.back{display:inline-flex;align-items:center;gap:6px;color:#94a3b8;text-decoration:none;font-size:.85em;font-weight:700;margin-bottom:18px;transition:color .2s}
.back:hover{color:#c4b5fd}
.hdr{text-align:center;padding:20px 20px 36px}
.hdr .ic{font-size:3em;display:block;margin-bottom:10px}
.hdr h1{font-size:1.9em;font-weight:900;background:linear-gradient(135deg,#fff 0%,#a78bfa 60%,#60a5fa 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:10px}
.hdesc{font-size:.88em;color:#94a3b8;line-height:1.7;max-width:520px;margin:0 auto}
.rrtag{display:block;margin-top:12px;font-size:.68em;color:#475569;letter-spacing:.3px}
.rrtag b{font-weight:700}
.bform{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:20px;padding:22px 24px;margin-bottom:26px}
.bform textarea{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:12px 14px;color:#e2e8f0;font-family:'Noto Sans KR',sans-serif;font-size:.9em;resize:vertical;min-height:80px;margin-bottom:12px}
.bform textarea::placeholder{color:#475569}
.brow{display:flex;align-items:center;gap:10px;justify-content:space-between;flex-wrap:wrap}
.battach{background:transparent;border:1px solid rgba(255,255,255,.15);color:#94a3b8;border-radius:16px;padding:8px 16px;font-size:.82em;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:border-color .2s,color .2s}
.battach:hover{border-color:rgba(167,139,250,.5);color:#c4b5fd}
.bsubmit{background:rgba(167,139,250,.22);border:1px solid rgba(167,139,250,.45);color:#c4b5fd;border-radius:16px;padding:9px 22px;font-size:.85em;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:background .2s}
.bsubmit:hover{background:rgba(167,139,250,.35)}
.pprevs{display:none;flex-wrap:wrap;gap:8px;margin-top:12px}
.pprev-item{position:relative;width:74px;height:74px;border-radius:10px;overflow:hidden;flex-shrink:0}
.pprev-item img{width:100%;height:100%;object-fit:cover;display:block}
.pprev-x{position:absolute;top:3px;right:3px;background:rgba(10,8,30,.8);color:#fff;border:none;width:20px;height:20px;border-radius:50%;font-size:.7em;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.pprev-x:hover{background:rgba(248,113,113,.8)}
.pcount{font-size:.78em;color:#64748b;margin-top:8px}
.btoolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.bcount{font-size:.85em;color:#64748b;font-weight:700}
.bdelall{background:transparent;border:1px solid rgba(148,163,184,.3);color:#64748b;border-radius:16px;padding:6px 16px;font-size:.75em;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:background .2s,border-color .2s,color .2s}
.bdelall:hover{background:rgba(248,113,113,.12);border-color:rgba(248,113,113,.4);color:#f87171}
.bgrid{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start}
.bcard{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;overflow:hidden;transition:border-color .2s}
.bcard:has(img):hover{border-color:rgba(167,139,250,.4)}
.bimggrid{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.bimggrid.one{grid-template-columns:1fr}
.bcard .bimgwrap{position:relative;overflow:hidden;background:rgba(0,0,0,.2)}
.bimggrid.one .bimgwrap{aspect-ratio:auto}
.bimggrid:not(.one) .bimgwrap{aspect-ratio:1/1}
.bimggrid:not(.one) .bimgwrap img{height:100%;object-fit:cover}
.bcard img{width:100%;height:auto;display:block;cursor:zoom-in;transition:transform .3s}
.bcard .bimgwrap:hover img{transform:scale(1.05)}
.bcard p{font-size:.87em;color:#cbd5e1;line-height:1.6;white-space:pre-wrap;padding:14px 16px}
.bempty{grid-column:1/-1;font-size:.88em;color:#64748b;text-align:center;padding:40px 0}
.atabs{display:flex;gap:8px;margin-bottom:20px}
.atab{flex:1;padding:11px;border-radius:14px;font-size:.85em;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:#94a3b8;transition:all .2s}
.atab:hover{background:rgba(255,255,255,.08);color:#e2e8f0}
.atab.active{background:rgba(167,139,250,.2);border-color:rgba(167,139,250,.5);color:#c4b5fd}
.teamgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:8px}
.teamcard{background:rgba(255,255,255,.04);border:1px solid rgba(167,139,250,.25);border-radius:18px;padding:20px 22px}
.teamlbl{font-size:.85em;font-weight:900;letter-spacing:1px;color:#c4b5fd;margin-bottom:12px}
.teammembers{display:flex;flex-wrap:wrap;gap:8px}
.teammember{background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.3);color:#e2e8f0;font-size:.85em;font-weight:700;padding:6px 14px;border-radius:20px}
@media(max-width:600px){.teamgrid{grid-template-columns:1fr}}
.lightbox{position:fixed;inset:0;background:rgba(5,4,15,.94);z-index:2000;display:none;align-items:center;justify-content:center;padding:28px;cursor:zoom-out}
.lightbox.show{display:flex}
.lightbox img{max-width:100%;max-height:100%;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.lbclose{position:absolute;top:20px;right:24px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;width:40px;height:40px;border-radius:50%;font-size:1.2em;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lbclose:hover{background:rgba(255,255,255,.2)}
@media(max-width:600px){.bgrid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
<a href="refresh.html" class="back">← Refresh로 돌아가기</a>
<div class="hdr">
  <span class="ic" id="aIcon">🎲</span>
  <h1 id="aTitle">활동 게시판</h1>
  <p class="hdesc" id="aDesc"></p>
  <div class="rrtag">R² + R² · <b style="color:#a78bfa">Refresh</b>×<b style="color:#fb923c">Respect</b> + <b style="color:#60a5fa">Review</b>×<b style="color:#34d399">Reboot</b></div>
</div>

<div class="atabs" id="aTabs" style="display:none">
  <button class="atab active" id="tabBoard" onclick="showTab('board')">📸 게시판</button>
  <button class="atab" id="tabTeams" onclick="showTab('teams')">👥 조 편성</button>
</div>

<div id="boardView">
<div class="bform">
  <textarea id="pText" maxlength="500" placeholder="사진 위주로 자유롭게 올려주세요 — 설명 글은 선택사항이에요"></textarea>
  <div class="brow">
    <button type="button" class="battach" onclick="document.getElementById('pFile').click()">📷 사진 추가 (여러 장 가능)</button>
    <button type="button" class="bsubmit" onclick="submitPost()">게시하기</button>
  </div>
  <input type="file" id="pFile" accept="image/*" multiple style="display:none" onchange="onFileSelected(event)">
  <div class="pprevs" id="pPreviewWrap"></div>
</div>

<div class="btoolbar">
  <span class="bcount" id="bCount">0개의 게시글</span>
  <button class="bdelall" onclick="deleteAll()">🔒 전체 삭제 (관리자)</button>
</div>

<div class="bgrid" id="board"></div>
</div>

<div id="teamsView" style="display:none">
  <div class="teamgrid" id="teamGrid"></div>
</div>
</div>

<div class="lightbox" id="lightbox" onclick="if(event.target===this)closeLightbox()">
  <button class="lbclose" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="확대된 이미지">
</div>

<nav class="bnav">
  <a href="index.html"   class="ni"><span class="ic">🏠</span>메인</a>
  <a href="result.html"  class="ni"><span class="ic">🏆</span>Result</a>
  <a href="cheer.html"   class="ni"><span class="ic">🔥</span>Respect<br>&amp; Roast</a>
  <a href="refresh.html" class="ni ar"><span class="ic">✨</span>Refresh</a>
  <a href="review.html"  class="ni"><span class="ic">🔍</span>Review</a>
  <a href="reboot.html"  class="ni"><span class="ic">🚀</span>Reboot</a>
</nav>
<script>
const RF_API='/api/refresh-activities';
const ACT_META={
  a1:{ic:'🎲',ttl:'보드게임',desc:'직급과 그룹을 섞어 팀을 구성하고 다양한 보드게임을 즐깁니다. 전략과 협력, 그리고 웃음이 넘치는 시간 — 서로를 새로운 눈으로 보게 되는 계기가 됩니다.'},
  a2:{ic:'🍲',ttl:'몸 보신 음식 만들기',desc:'함께 장을 보고, 직접 몸에 좋은 음식을 만들어 먹는 시간. 요리 과정에서 자연스럽게 대화가 이어지고, 함께 만들어 먹는 밥 한 끼가 팀의 유대감을 깊게 만듭니다.'},
  a3:{ic:'🚣',ttl:'래프팅',desc:'비가 오지 않는다면 — 짜릿한 래프팅으로 팀의 한계를 함께 넘어봅니다. 같은 보트에 타고 호흡을 맞추다 보면, 팀워크가 자연스럽게 완성됩니다.'},
  a4:{ic:'🎮',ttl:'각종 단합 게임',desc:'실내외에서 즐길 수 있는 팀 단합 게임 4종 이상 진행. 경쟁보다는 웃음과 협업 중심으로 구성됩니다.'}
};

const TEAMS=[
  {lbl:'1조',members:['팀장님','군주','민호','은솔','승하','동현','지상']},
  {lbl:'2조',members:['병주','민재','성영','규동','종관','동훈','선영']}
];

const params=new URLSearchParams(location.search);
const actId=ACT_META[params.get('id')]?params.get('id'):'a1';
const MAX_IMAGES=8;
let posts=[];
let curImages=[];

function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function initMeta(){
  const m=ACT_META[actId];
  document.getElementById('aIcon').textContent=m.ic;
  document.getElementById('aTitle').textContent=m.ttl+' 게시판';
  document.getElementById('aDesc').textContent=m.desc;
  document.title=m.ttl+' 게시판 | \'26 전략소재구매팀 워크샵';
  if(actId==='a4'){
    document.getElementById('aTabs').style.display='flex';
    renderTeams();
  }
}

function renderTeams(){
  const g=document.getElementById('teamGrid');
  g.innerHTML=TEAMS.map(t=>`<div class="teamcard"><div class="teamlbl">${t.lbl}</div><div class="teammembers">${t.members.map(m=>`<span class="teammember">${esc(m)}</span>`).join('')}</div></div>`).join('');
}

function showTab(tab){
  document.getElementById('tabBoard').classList.toggle('active',tab==='board');
  document.getElementById('tabTeams').classList.toggle('active',tab==='teams');
  document.getElementById('boardView').style.display=tab==='board'?'block':'none';
  document.getElementById('teamsView').style.display=tab==='teams'?'block':'none';
}

function renderBoard(){
  const g=document.getElementById('board');
  document.getElementById('bCount').textContent=posts.length+'개의 게시글';
  if(!posts.length){g.innerHTML='<div class="bempty">아직 게시글이 없어요. 첫 번째로 남겨보세요!</div>';return}
  g.innerHTML=posts.map(p=>{
    const imgs=p.dataUrls||(p.dataUrl?[p.dataUrl]:[]);
    const imgsHtml=imgs.length?`<div class="bimggrid ${imgs.length===1?'one':''}">${imgs.map(src=>`<div class="bimgwrap"><img src="${src}" alt="첨부 이미지" onclick="openLightbox(this)"></div>`).join('')}</div>`:'';
    const textHtml=p.text?`<p>${esc(p.text)}</p>`:'';
    return `<div class="bcard">${imgsHtml}${textHtml}</div>`;
  }).join('');
}

function openLightbox(imgEl){
  document.getElementById('lightboxImg').src=imgEl.src;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('show');
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLightbox()});

async function loadBoard(){
  try{
    const r=await fetch(RF_API);
    if(!r.ok)throw new Error('fail');
    const data=await r.json();
    posts=data[actId]||[];
  }catch(e){posts=[]}
  renderBoard();
}

function resizeImage(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        const maxW=800;
        const scale=Math.min(1,maxW/img.width);
        const w=Math.round(img.width*scale),h=Math.round(img.height*scale);
        const canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',.7));
      };
      img.onerror=reject;
      img.src=reader.result;
    };
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

function renderPreview(){
  const wrap=document.getElementById('pPreviewWrap');
  if(!curImages.length){wrap.style.display='none';wrap.innerHTML='';return}
  wrap.style.display='flex';
  wrap.innerHTML=curImages.map((src,i)=>`<div class="pprev-item"><img src="${src}"><button type="button" class="pprev-x" onclick="removeImage(${i})">✕</button></div>`).join('');
}

function removeImage(i){
  curImages.splice(i,1);
  renderPreview();
}

async function onFileSelected(ev){
  const files=Array.from(ev.target.files||[]);
  if(!files.length)return;
  const room=MAX_IMAGES-curImages.length;
  if(room<=0){
    alert(`사진은 게시글 하나에 최대 ${MAX_IMAGES}장까지 첨부할 수 있어요.`);
    ev.target.value='';return;
  }
  const toProcess=files.slice(0,room);
  if(files.length>room)alert(`최대 ${MAX_IMAGES}장까지만 추가돼요. 나머지는 제외했어요.`);
  for(const f of toProcess){
    try{curImages.push(await resizeImage(f))}catch(e){/* skip failed image */}
  }
  ev.target.value='';
  renderPreview();
}

async function submitPost(){
  const text=document.getElementById('pText').value.trim();
  if(!text&&!curImages.length){alert('사진이나 글 중 하나는 남겨주세요.');return}
  try{
    const r=await fetch(RF_API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({activity:actId,text,images:curImages})});
    if(!r.ok){alert('등록 중 오류가 발생했어요.');return}
    posts=await r.json();
    document.getElementById('pText').value='';
    document.getElementById('pFile').value='';
    curImages=[];
    renderPreview();
    renderBoard();
  }catch(e){alert('등록 중 오류가 발생했어요.')}
}

async function deleteAll(){
  const pw=prompt('관리자 비밀번호를 입력하세요');
  if(pw===null)return;
  try{
    const r=await fetch(`${RF_API}?activity=${actId}&pw=${encodeURIComponent(pw)}`,{method:'DELETE'});
    if(r.status===403){alert('비밀번호가 올바르지 않습니다.');return}
    if(!r.ok){alert('삭제 중 오류가 발생했어요.');return}
    posts=await r.json();
    renderBoard();
  }catch(e){alert('삭제 중 오류가 발생했어요.')}
}

initMeta();
loadBoard();
</script>
</body>
</html>
